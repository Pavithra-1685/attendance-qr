<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance | Student Portal</title>
    <link rel="icon" href="logo3.png" sizes="16x16" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script defer src="/script.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #8b5cf6;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass: rgba(255, 255, 255, 0.8);
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            border-radius: 24px;
        }

        .premium-input {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #e2e8f0;
        }

        .premium-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            transform: translateY(-1px);
        }

        .btn-gradient {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-outline {
            border: 2px solid var(--primary);
            color: var(--primary);
            transition: all 0.3s ease;
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        .floating-badge {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .status-dot {
            height: 8px;
            width: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        /* Decorative Shapes */
        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        .blob-1 { top: -100px; left: -100px; background: rgba(99, 102, 241, 0.15); }
        .blob-2 { bottom: -100px; right: -100px; background: rgba(236, 72, 153, 0.15); animation-delay: -5s; }
        .blob-3 { top: 40%; left: 60%; width: 300px; height: 300px; background: rgba(139, 92, 246, 0.1); animation-delay: -10s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 50px) scale(1.1); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-6 overflow-x-hidden">
    <!-- Decorative Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="max-w-xl w-full relative z-10">
        <!-- Header -->
        <div class="text-center mb-10 relative">
            <a href="home.html" class="absolute top-0 right-0 flex items-center gap-2 px-3 py-1.5 bg-red-50 text-red-600 rounded-xl text-sm font-bold hover:bg-red-100 transition-colors shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Logout
            </a>
            <div id="db-status" class="inline-flex items-center gap-2 px-3 py-1 bg-red-50 text-red-600 rounded-full text-[10px] font-bold uppercase tracking-wider mb-4 border border-red-100">
                <span class="status-dot bg-red-500"></span>
                Database Offline
            </div>
            <div class="block"></div>
            <div class="inline-block p-4 bg-white rounded-3xl shadow-xl mb-6">
                <img src="logo3.png" alt="Logo" class="w-16 h-16 object-contain">
            </div>
            <h1 class="text-4xl font-bold text-slate-900 tracking-tight">Smart Attendance</h1>
            <p class="text-slate-500 mt-2 text-lg">Secure classroom validation system</p>
        </div>

        <!-- Main Form Card -->
        <div class="glass-card p-8 mb-8">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-2 h-8 bg-indigo-500 rounded-full"></div>
                <h2 class="text-2xl font-bold text-slate-800">Mark Attendance</h2>
            </div>

            <form id="attendanceForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 ml-1">Full Name</label>
                        <input type="text" id="name" placeholder="John Doe" 
                            class="premium-input w-full p-4 rounded-xl outline-none text-slate-800 bg-white/50">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 ml-1">University Roll No</label>
                        <input type="text" id="universityRollNo" placeholder="20XXXXXXX" 
                            class="premium-input w-full p-4 rounded-xl outline-none text-slate-800 bg-white/50">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 ml-1">Section</label>
                        <input type="text" id="section" placeholder="CSE-A" 
                            class="premium-input w-full p-4 rounded-xl outline-none text-slate-800 bg-white/50">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 ml-1">Class Roll No</label>
                        <input type="text" id="classRollNo" placeholder="45" 
                            class="premium-input w-full p-4 rounded-xl outline-none text-slate-800 bg-white/50">
                    </div>
                </div>

                <button type="submit" 
                    class="btn-gradient w-full py-4 rounded-2xl text-white font-bold text-lg shadow-lg flex items-center justify-center gap-2 mt-4">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Confirm Presence
                </button>
                <button type="button" id="scan-qr-btn" onclick="startQRScanner()"
                    class="btn-outline w-full py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-2 mt-4">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h4a1 1 0 010 2H5v3a1 1 0 01-2 0V4zm14-1a1 1 0 011 1v3a1 1 0 01-2 0V5h-3a1 1 0 010-2h4zM3 20a1 1 0 001 1h4a1 1 0 100-2H5v-3a1 1 0 10-2 0v4zm14 1a1 1 0 001-1v-4a1 1 0 10-2 0v3h-3a1 1 0 100 2h4z" />
                    </svg>
                    Scan QR Code
                </button>
            </form>

            <div id="status" class="mt-6 p-4 rounded-xl text-center hidden"></div>
        </div>

        <!-- Medical & Dashboard Quick Actions -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Hospital Leave Card -->
            <div class="glass-card p-6 border-l-4 border-amber-400 flex flex-col">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2.5 bg-amber-100 rounded-xl">
                        <svg class="w-6 h-6 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                        </svg>
                    </div>
                    <h3 class="font-bold text-slate-800 text-lg">Hospital Permission</h3>
                </div>
                <div class="space-y-3 mt-auto">
                    <button onclick="requestMedicalLeave()" class="btn-gradient w-full py-3 rounded-xl font-bold text-white shadow-md text-sm">
                        Request Medical Leave
                    </button>
                    <button onclick="uploadMedicalProof()" class="btn-outline w-full py-3 rounded-xl font-bold text-sm">
                        Upload Proof Document
                    </button>
                </div>
            </div>

            <!-- Attendance Check Card -->
            <div class="glass-card p-6 border-l-4 border-indigo-500 flex flex-col">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2.5 bg-indigo-100 rounded-xl">
                        <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                        </svg>
                    </div>
                    <h3 class="font-bold text-slate-800 text-lg">Check Status</h3>
                </div>
                <div class="space-y-3 mt-auto">
                    <div class="relative">
                        <input type="text" id="rollInput" placeholder="Enter University Roll No" 
                            class="premium-input w-full p-3.5 rounded-xl text-sm outline-none bg-white/50 pr-12">
                        <div class="absolute right-3 top-3 text-slate-300">
                            <i class="fas fa-id-card"></i>
                        </div>
                    </div>
                    <button id="view-dashboard-btn" class="bg-slate-900 text-white w-full py-3 rounded-xl font-bold hover:bg-slate-800 transition-all flex items-center justify-center gap-2 text-sm">
                        View Student Dashboard
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <p id="accessMessage" class="text-center mt-6 text-sm font-medium"></p>
    </div>

    <!-- QR Scanner Modal -->
    <div id="qr-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black/50 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl m-4 relative">
            <button onclick="stopQRScanner()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <h3 class="text-xl font-bold text-slate-800 mb-4 text-center">Scan Attendance QR</h3>
            <div id="reader" class="w-full rounded-2xl overflow-hidden bg-slate-100"></div>
            <p id="qr-status" class="text-center mt-4 text-sm text-slate-500">Position the QR code within the frame</p>
        </div>
    </div>

    <script>
        async function checkDBStatus() {
            const statusEl = document.getElementById('db-status');
            try {
                const res = await fetch('/api/attendance/by-date?date=2024-01-01'); // Simple probe
                if (res.ok) {
                    statusEl.innerHTML = '<span class="status-dot bg-green-500"></span> Database Online';
                    statusEl.className = 'inline-flex items-center gap-2 px-3 py-1 bg-green-50 text-green-600 rounded-full text-[10px] font-bold uppercase tracking-wider mb-4 border border-green-100';
                }
            } catch (e) {
                // Keep red
            }
        }
        document.addEventListener('DOMContentLoaded', checkDBStatus);
    </script>
</body>
</html>
